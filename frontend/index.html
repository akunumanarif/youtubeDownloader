<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="#FF0000"/>
        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#fff"/>
      </svg>
      <span class="logo-text">YT Downloader</span>
    </div>
  </header>

  <main class="main">
    <!-- URL Input -->
    <section class="card url-card">
      <label class="input-label" for="url-input">YouTube URL</label>
      <div class="input-row">
        <input
          id="url-input"
          class="url-input"
          type="url"
          placeholder="https://youtube.com/watch?v=... or playlist URL"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="fetch-btn" class="btn btn-primary" onclick="fetchInfo()">
          <span class="btn-text">Fetch</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </div>
      <p id="url-error" class="error-msg hidden"></p>
    </section>

    <!-- Video Info -->
    <section id="info-card" class="card info-card hidden">
      <div id="video-info" class="video-info">
        <img id="thumbnail" class="thumbnail" src="" alt="Thumbnail" />
        <div class="video-meta">
          <p id="video-title" class="video-title"></p>
          <p id="video-uploader" class="video-uploader"></p>
          <p id="video-duration" class="video-duration"></p>
        </div>
      </div>

      <!-- Playlist badge -->
      <div id="playlist-badge" class="playlist-badge hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 7h13M3 12h13M3 17h9M17 14l4 3-4 3V14z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="playlist-count"></span>
      </div>

      <!-- Playlist preview -->
      <ul id="playlist-preview" class="playlist-preview hidden"></ul>

      <!-- Options -->
      <div class="options-row">
        <div class="option-group">
          <label class="option-label">Format</label>
          <div class="toggle-group">
            <button id="btn-video" class="toggle-btn active" onclick="setFormat('video')">Video</button>
            <button id="btn-audio" class="toggle-btn" onclick="setFormat('audio')">Audio</button>
          </div>
        </div>
        <div class="option-group">
          <label class="option-label" for="quality-select">Quality</label>
          <select id="quality-select" class="select"></select>
        </div>
      </div>

      <button id="download-btn" class="btn btn-download" onclick="startDownload()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v13M7 11l5 5 5-5M3 21h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Download
      </button>
    </section>

    <!-- Progress -->
    <section id="progress-card" class="card progress-card hidden">
      <p id="progress-label" class="progress-label">Preparing...</p>
      <div class="progress-bar-track">
        <div id="progress-bar-fill" class="progress-bar-fill" style="width:0%"></div>
      </div>
      <p id="progress-pct" class="progress-pct">0%</p>
    </section>

    <!-- Done -->
    <section id="done-card" class="card done-card hidden">
      <div class="done-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#22c55e"/><path d="M7 12.5l3.5 3.5 6.5-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <p class="done-title">Ready to download!</p>
      <a id="download-link" class="btn btn-success" href="#" download>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v13M7 11l5 5 5-5M3 21h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Save File
      </a>
      <button class="btn btn-ghost" onclick="resetAll()">Download another</button>
    </section>
  </main>

  <footer class="footer">
    <p>For personal use only &mdash; respect copyright laws.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
