# Temporary HTTP-only config used during initial SSL certificate acquisition.
# Replaced by app.conf after running init-ssl.sh.

server {
    listen 80;
    server_name ytdownloader.numanarif.dev;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
