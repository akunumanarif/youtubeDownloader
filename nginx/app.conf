# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ytdownloader.numanarif.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl;
    http2 on;
    server_name ytdownloader.numanarif.dev;

    ssl_certificate     /etc/letsencrypt/live/ytdownloader.numanarif.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ytdownloader.numanarif.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    client_max_body_size 0;      # no upload limit (downloads only)
    proxy_read_timeout   3600s;  # allow long downloads

    # Frontend static files
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;  # stream file downloads directly
    }
}
